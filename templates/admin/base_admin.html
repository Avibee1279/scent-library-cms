<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · {{ site_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}?v=logo-upload-1">
</head>
<body>
  <nav class="admin-nav">
    <a href="{{ url_for('admin_dashboard') }}">Products</a>
    <a href="{{ url_for('admin_orders') }}">Requests</a>
    <a href="{{ url_for('admin_combos') }}">Layering combos</a>
    <a href="{{ url_for('admin_banners') }}">Banners</a>
    <a href="{{ url_for('admin_settings') }}">Settings</a>
    <a href="{{ url_for('admin_password') }}">Password</a>
    <a href="{{ url_for('index') }}" target="_blank">View site</a>
    <a href="{{ url_for('admin_logout') }}">Logout</a>
  </nav>
  <main class="admin-main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
