{% extends "admin/base_admin.html" %}
{% block content %}
<div class="admin-header">
  <div><h1>Change password</h1><p>Change the default admin password before publishing online.</p></div>
</div>
<form class="form-grid small-form" method="post">
  <label class="wide">Current password<input type="password" name="current_password" required></label>
  <label class="wide">New password<input type="password" name="new_password" required></label>
  <label class="wide">Confirm new password<input type="password" name="confirm_password" required></label>
  <div class="wide"><button type="submit">Change password</button></div>
</form>
{% endblock %}
