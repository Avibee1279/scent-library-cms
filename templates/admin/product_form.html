{% extends "admin/base_admin.html" %}
{% block content %}
<div class="admin-header">
  <div><h1>{{ action }}</h1><p>Add photos, price, notes and WhatsApp catalogue details.</p></div>
  <a class="button secondary" href="{{ url_for('admin_dashboard') }}">Back</a>
</div>
<form class="form-grid" method="post" enctype="multipart/form-data">
  <input type="hidden" name="existing_image" value="{{ product.image_filename if product else '' }}">
  <label>Name<input name="name" value="{{ product.name if product else '' }}" required></label>
  <label>Brand / Inspiration<input name="brand" value="{{ product.brand if product else '' }}"></label>
  <label>Category
    <select name="category">
      {% for c in ['Men','Women','Unisex'] %}
        <option value="{{ c }}" {% if product and product.category == c %}selected{% endif %}>{{ c }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Size<input name="size" placeholder="50ml" value="{{ product.size if product else '' }}"></label>
  <label>Price<input type="number" step="0.01" name="price" value="{{ product.price if product else 0 }}"></label>
  <label>Sort order<input type="number" name="sort_order" value="{{ product.sort_order if product else 0 }}"></label>
  <label>Occasion<input name="occasion" value="{{ product.occasion if product else '' }}"></label>
  <label class="wide">Description<textarea name="description" rows="4">{{ product.description if product else '' }}</textarea></label>
  <label class="wide">Notes<textarea name="notes" rows="3">{{ product.notes if product else '' }}</textarea></label>
  <label class="wide">Photo<input type="file" name="image" accept="image/*"></label>
  {% if product and product.image_filename %}
    <div class="current-image wide"><img src="{{ url_for('static', filename='uploads/' ~ product.image_filename) }}" alt="Current image"><span>Current photo</span></div>
  {% endif %}
  <label class="check"><input type="checkbox" name="is_featured" {% if product and product.is_featured %}checked{% endif %}> Featured product</label>
  <label class="check"><input type="checkbox" name="is_active" {% if not product or product.is_active %}checked{% endif %}> Show on website</label>
  <div class="wide"><button class="button" type="submit">Save product</button></div>
</form>
{% endblock %}
